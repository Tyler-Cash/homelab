---
app-template:
  image:
    repository: felddy/foundryvtt
    tag: 12.331.0
    pullPolicy: IfNotPresent

  env:
    FOUNDRY_USERNAME: "tcash"

  envFrom:
    - secretRef:
        name: foundry-password-secret

  service:
    main:
      ports:
        http:
          port: 30000

  ingress:
    main:
      enabled: true
      hosts:
        - host: foundry.k8s.tylercash.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                port: 30000
      tls:
        - secretName: foundry-letsencrypt-certificate
          hosts:
            - foundry.k8s.tylercash.dev

  podSecurityContext:
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
    fsGroupChangePolicy: "Always"

  persistence:
    data:
      enabled: true
      storageClass: ceph-block
      size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
